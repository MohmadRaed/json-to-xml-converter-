<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON to XML Converter - Programming 4</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header {
            padding: 30px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 32px;
        }

        .header p {
            margin: 6px 0;
            font-size: 16px;
            opacity: 0.95;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            padding: 30px;
        }

        .panel {
            background: #111827;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.07);
        }

        .panel h2 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 22px;
            color: #93c5fd;
        }

        textarea {
            width: 100%;
            min-height: 320px;
            resize: vertical;
            border: none;
            outline: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 15px;
            font-family: Consolas, monospace;
            background: #0b1220;
            color: #e5e7eb;
            border: 1px solid #334155;
        }

        .actions {
            padding: 0 30px 30px 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        button.secondary {
            background: #334155;
        }

        .status {
            font-size: 15px;
            color: #cbd5e1;
        }

        .footer {
            padding: 20px 30px 30px 30px;
            color: #94a3b8;
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>JSON to XML Converter</h1>
        <p><strong>Name:</strong> Mohmad Raed Odeh</p>
        <p><strong>Neptune Code:</strong> DZL1F2</p>
        <p><strong>Course:</strong> Programming 4</p>
    </div>

    <div class="content">
        <div class="panel">
            <h2>JSON Input</h2>
            <textarea id="jsonInput">
{
  "name": "Mohammad",
  "age": 25,
  "course": "Programming 4"
}
            </textarea>
        </div>

        <div class="panel">
            <h2>XML Output</h2>
            <textarea id="xmlOutput" readonly placeholder="XML output will appear here..."></textarea>
        </div>
    </div>

    <div class="actions">
        <button onclick="convertJsonToXml()">Convert to XML</button>
        <button class="secondary" onclick="clearFields()">Clear</button>
        <span class="status" id="statusMessage">Ready</span>
    </div>

    <div class="footer">
        Frontend for Spring Boot JSON → XML converter project.
    </div>
</div>

<script>
    async function convertJsonToXml() {
        const jsonInput = document.getElementById("jsonInput").value;
        const xmlOutput = document.getElementById("xmlOutput");
        const statusMessage = document.getElementById("statusMessage");

        xmlOutput.value = "";
        statusMessage.textContent = "Converting...";

        try {
            JSON.parse(jsonInput);

            const response = await fetch("http://localhost:8080/convert", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: jsonInput
            });

            if (!response.ok) {
                throw new Error("Server returned status " + response.status);
            }

            const xml = await response.text();
            xmlOutput.value = xml;
            statusMessage.textContent = "Conversion successful";
        } catch (error) {
            xmlOutput.value = "Error: " + error.message;
            statusMessage.textContent = "Conversion failed";
        }
    }

    function clearFields() {
        document.getElementById("jsonInput").value = "";
        document.getElementById("xmlOutput").value = "";
        document.getElementById("statusMessage").textContent = "Cleared";
    }
</script>
</body>
</html>
